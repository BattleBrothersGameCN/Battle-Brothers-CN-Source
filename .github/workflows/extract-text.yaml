name: Extract Text From Source

permissions:
  contents: write
  pull-requests: write
  packages: read

on:
  # schedule:
  # 每天4点(UTC时间)执行 1 次
  # - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      job_id:
        description: "Manifest job id to extract. Use all for every job."
        required: false
        default: all

jobs:
  extract-text:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/battlebrothersgamecn/bb-text-extractor
      credentials:
        username: oauth2
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Battle-Brothers-CN Project
        uses: actions/checkout@v4
        with:
          repository: shabbywu/Battle-Brothers-CN
          path: Battle-Brothers-CN

      - name: Checkout source inputs
        uses: actions/checkout@v4
        with:
          path: Source
          submodules: recursive

      - name: Perform extraction
        shell: bash
        run: |
          python Source/tools/extract_text.py "$PWD/Battle-Brothers-CN" --job "${{ inputs.job_id }}"

      - name: Create Pull Request to shabbywu/Battle-Brothers-CN
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.MR_TOKEN }}
          branch-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: extract text from scripts
          title: Auto Text Extraction
          body: |
            This is an automated PR.

            The extraction branch is pushed to BattleBrothersGameCN/Battle-Brothers-CN
            and proposed for merge into shabbywu/Battle-Brothers-CN.
          branch: auto-extraction
          push-to-fork: BattleBrothersGameCN/Battle-Brothers-CN
          base: main
          assignees: shabbywu
          path: Battle-Brothers-CN
